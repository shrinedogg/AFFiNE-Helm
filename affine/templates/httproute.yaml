{{- if .Values.global.gateway.enabled -}}
{{- $fullName := include "affine.fullname" . -}}
{{- $gw := .Values.global.gateway -}}
{{- if not $gw.name -}}
  {{- fail "global.gateway.name is required when global.gateway.enabled is true" -}}
{{- end -}}
{{- $hostnames := $gw.hostnames | default .Values.global.ingress.hosts -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "affine.labels" . | nindent 4 }}
  {{- with $gw.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ $gw.name | quote }}
      {{- if $gw.namespace }}
      namespace: {{ $gw.namespace | quote }}
      {{- end }}
      {{- if $gw.sectionName }}
      sectionName: {{ $gw.sectionName | quote }}
      {{- end }}
  {{- with $hostnames }}
  hostnames:
    {{- range . }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /socket.io
      backendRefs:
        - name: {{ .Values.front.services.sync.name }}
          port: {{ .Values.front.services.sync.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /graphql
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: affine-graphql
          port: {{ .Values.graphql.service.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /workspace
      backendRefs:
        - name: {{ .Values.front.services.renderer.name }}
          port: {{ .Values.front.services.renderer.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Values.front.services.web.name }}
          port: {{ .Values.front.services.web.port }}
{{- end }}
